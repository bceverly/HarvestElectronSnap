name: harvest-desktop
title: Harvest Desktop
version: '1.0.1'
summary: Desktop wrapper for Harvest time tracking
description: |
  Electron-based desktop application that wraps the Harvest
  (getharvest.com) web interface into a native desktop experience.
license: BSD-2-Clause
contact: https://github.com/bceverly/HarvestElectronSnap/issues
issues: https://github.com/bceverly/HarvestElectronSnap/issues
source-code: https://github.com/bceverly/HarvestElectronSnap
website: https://www.getharvest.com

icon: snap/gui/harvest-desktop.png

base: core24
grade: stable
confinement: strict
compression: lzo

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

apps:
  harvest-desktop:
    command: harvest-desktop --no-sandbox
    extensions: [gnome]
    common-id: com.getharvest.desktop
    plugs:
      - network
      - network-bind
      - browser-support
      - audio-playback
      - screen-inhibit-control

parts:
  harvest-desktop:
    plugin: dump
    source: dist/linux-unpacked
